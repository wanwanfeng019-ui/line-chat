<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LINE Chat</title>
<style>
:root {
  --green:#06C755;--green-dark:#05a348;--bg:#111b21;--chat-bg:#0b141a;
  --bubble-me:#005c4b;--bubble-you:#202c33;--text:#e9edef;--text2:#8696a0;
  --text3:#667781;--border:#222d34;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:320px;background:#111b21;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:1em;font-weight:600;flex:1}
.room-list{flex:1;overflow-y:auto}
.room-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
.room-item:hover{background:rgba(255,255,255,.04)}.room-item.active{background:rgba(255,255,255,.08)}
.r-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0}
.r-info{flex:1;min-width:0}.r-name{font-size:.88em;font-weight:500}.r-last{font-size:.75em;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-meta{text-align:right;flex-shrink:0}.r-time{font-size:.65em;color:var(--text3)}.r-badge{background:var(--green);color:#fff;font-size:.62em;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 5px;margin-top:3px;font-weight:600}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.chat-header{padding:10px 16px;background:var(--chat-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8em;color:#fff;flex-shrink:0}
.chat-header .info{flex:1}.chat-header .name{font-size:.9em;font-weight:600}.chat-header .members{font-size:.68em;color:var(--text2)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:10px 16px;background:var(--chat-bg);display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}.messages::-webkit-scrollbar-thumb{background:var(--text3);border-radius:4px}

.msg-wrap{display:flex;max-width:78%;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-wrap.me{align-self:flex-end;flex-direction:row-reverse}.msg-wrap.you{align-self:flex-start}
.msg-wrap .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55em;color:#fff;flex-shrink:0;margin-top:2px}
.msg-wrap.you .avatar{margin-right:6px}.msg-wrap.me .avatar{display:none}

.msg-body{display:flex;flex-direction:column;position:relative}
.msg-wrap.you .msg-body{align-items:flex-start}.msg-wrap.me .msg-body{align-items:flex-end}

.msg-sender{font-size:.65em;color:var(--green);margin-bottom:1px;padding-left:8px}

/* Reply preview */
.msg-reply{
  font-size:.68em;color:var(--text2);background:rgba(255,255,255,.06);padding:3px 8px;
  border-radius:6px;margin-bottom:2px;border-left:3px solid var(--green);cursor:pointer;
  max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.msg-bubble{padding:7px 12px;font-size:.86em;line-height:1.45;word-break:break-word;border-radius:8px;position:relative;cursor:pointer}
.msg-wrap.you .msg-bubble{background:var(--bubble-you);border-top-left-radius:0}
.msg-wrap.me .msg-bubble{background:var(--bubble-me);border-top-right-radius:0}
.msg-wrap.me .msg-bubble:hover,.msg-wrap.you .msg-bubble:hover{filter:brightness(1.08)}

/* @mention highlight */
.mention{color:#ffe066;font-weight:600;background:rgba(255,224,102,.15);padding:1px 4px;border-radius:3px}

.msg-meta{display:flex;align-items:center;gap:4px;margin-top:2px;font-size:.6em;color:var(--text3)}
.msg-wrap.me .msg-meta{padding-right:4px;justify-content:flex-end}
.msg-read{color:var(--green);font-size:.85em}

/* Image */
.msg-image{max-width:220px;max-height:220px;border-radius:8px;cursor:pointer;display:block}
.msg-deleted .msg-bubble{background:rgba(255,255,255,.03)!important;color:var(--text3);font-style:italic}
.date-divider{text-align:center;margin:10px 0;font-size:.65em;color:var(--text3);background:rgba(255,255,255,.04);align-self:center;padding:3px 10px;border-radius:5px}
.msg-system{align-self:center;font-size:.62em;color:var(--text3);padding:2px 12px;margin:3px 0}

/* Scroll to bottom */
.scroll-btn{position:absolute;bottom:70px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--green);color:#fff;border:none;cursor:pointer;z-index:15;display:none;align-items:center;justify-content:center;font-size:1.2em;box-shadow:0 2px 12px rgba(0,0,0,.4);animation:bounce .5s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.scroll-btn.show{display:flex}

/* Image lightbox */
.lightbox{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;cursor:pointer}
.lightbox.show{display:flex}.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain}.lightbox .close-lb{position:absolute;top:16px;right:16px;color:#fff;font-size:1.5em;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center}

/* Input */
.input-bar{padding:8px 12px;background:var(--chat-bg);border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;position:relative}
.input-bar input{flex:1;padding:9px 14px;border-radius:20px;border:none;background:var(--bubble-you);color:var(--text);font-size:.88em;outline:none;font-family:var(--font)}
.input-bar input::placeholder{color:var(--text3)}
.input-bar button{width:36px;height:36px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:1em;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.input-bar button:active{transform:scale(.9)}
.input-bar .icon-btn{background:transparent;font-size:1.2em}

/* Reply bar above input */
.reply-bar{display:none;align-items:center;gap:8px;padding:6px 12px;background:var(--bubble-you);border-top:1px solid var(--border);font-size:.78em}
.reply-bar.show{display:flex}
.reply-bar .r-text{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-bar .r-close{color:var(--text3);cursor:pointer;font-size:1.1em}

/* @mention dropdown */
.mention-drop{position:absolute;bottom:56px;left:60px;background:var(--bubble-you);border:1px solid var(--border);border-radius:10px;max-height:180px;overflow-y:auto;width:180px;display:none;z-index:19}
.mention-drop.show{display:block}.mention-drop .m-item{padding:8px 12px;cursor:pointer;font-size:.82em;transition:background .1s}.mention-drop .m-item:hover{background:rgba(255,255,255,.06)}

/* Emoji */
.emoji-picker{position:absolute;bottom:56px;left:0;right:0;background:var(--bubble-you);border-top:1px solid var(--border);padding:8px;z-index:18;max-height:240px;overflow-y:auto;display:none}
.emoji-picker.show{display:block}
.emoji-search input{width:100%;padding:6px 10px;border-radius:8px;border:none;background:var(--chat-bg);color:var(--text);font-size:.8em;outline:none;font-family:var(--font)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}.emoji-item{font-size:1.3em;padding:5px;cursor:pointer;border-radius:5px;transition:background .1s}.emoji-item:hover{background:rgba(255,255,255,.1)}

/* Context menu */
.ctx-menu{position:fixed;background:#233138;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:50;padding:4px;display:none;min-width:150px}
.ctx-menu.show{display:block}.ctx-menu button{display:block;width:100%;padding:9px 16px;border:none;background:none;color:var(--text);font-size:.8em;cursor:pointer;text-align:left;border-radius:6px;font-family:var(--font)}.ctx-menu button:hover{background:rgba(255,255,255,.08)}.ctx-menu button.danger{color:#ea0038}

/* Overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}.overlay.hidden{display:none}
.dialog{background:var(--bubble-you);border-radius:16px;padding:28px 24px;width:90%;max-width:340px;text-align:center}.dialog h3{font-size:1em;margin-bottom:6px}.dialog p{font-size:.75em;color:var(--text2);margin-bottom:14px}.dialog input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--chat-bg);color:var(--text);font-size:.9em;margin:4px 0;outline:none;text-align:center;font-family:var(--font)}.dialog input:focus{border-color:var(--green)}.dialog button{width:100%;padding:11px;border-radius:10px;border:none;background:var(--green);color:#fff;font-weight:600;font-size:.9em;cursor:pointer;margin-top:10px}
/* Calendar */
.cal-dialog{max-width:380px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin:10px 0}
.cal-header button{background:transparent;color:var(--text);border:none;font-size:1.2em;cursor:pointer;width:auto;padding:4px 12px}
.cal-header span{font-weight:700;font-size:.95em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dow{font-size:.65em;color:var(--text3);padding:4px 0}
.cal-day{font-size:.78em;padding:6px 0;border-radius:6px;cursor:default}
.cal-day.checked{background:var(--green);color:#fff;font-weight:700}
.cal-day.today{border:1px solid var(--green)}
.cal-day.dim{color:#444}
.cal-checkin-btn{width:100%;padding:11px;border-radius:10px;border:none;background:var(--green);color:#fff;font-weight:600;font-size:.9em;cursor:pointer;margin-top:12px;font-family:var(--font)}
.cal-checkin-btn:disabled{background:#444;color:#888;cursor:not-allowed}.dialog .err{color:#ea0038;font-size:.73em;margin-top:4px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:.78em;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}.toast.show{opacity:1}

.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text3);gap:8px;font-size:.9em}
.empty-state .icon{font-size:3em}

@media(max-width:600px){
  .sidebar{width:100%;position:absolute;z-index:10;height:100dvh;transition:transform .25s}
  .sidebar.hidden-m{transform:translateX(-100%)}
  .main{width:100%}
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><div class="r-avatar" style="background:#06C755">💬</div><h2>チャット</h2></div>
  <div class="room-list" id="roomList"></div>
</div>

<!-- Main -->
<div class="main" id="mainChat">
  <div class="empty-state" id="emptyState"><div class="icon">💬</div><div>← ルームを選択</div></div>
  <div class="chat-header" id="chatHeader" style="display:none">
    <div class="avatar" id="chatAvatar">🏠</div>
    <div class="info"><div class="name" id="chatName">---</div><div class="members" id="chatMembers">---</div></div>
    <span style="font-size:1.1em;cursor:pointer" id="checkinBtn" onclick="toggleCalendar()" title="签到">📅</span>
    <span style="color:var(--text3);font-size:.68em;cursor:pointer" onclick="backToSidebar()">← 戻る</span>
  </div>
  <div class="messages" id="messages" style="display:none"></div>
  <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">↓</button>

  <!-- Reply bar -->
  <div class="reply-bar" id="replyBar"><span style="color:var(--green)">↩</span><span class="r-text" id="replyText"></span><span class="r-close" onclick="cancelReply()">✕</span></div>

  <!-- Input -->
  <div class="input-bar" id="inputBar" style="display:none">
    <button class="icon-btn" onclick="toggleEmoji()">😊</button>
    <button class="icon-btn" onclick="document.getElementById('imgInput').click()">🖼</button>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="sendImage(this)">
    <input id="msgInput" placeholder="メッセージ…" maxlength="2000" disabled>
    <button onclick="send()">➤</button>
    <!-- @mention dropdown -->
    <div class="mention-drop" id="mentionDrop"></div>
    <!-- Emoji picker -->
    <div class="emoji-picker" id="emojiPicker">
      <div class="emoji-search"><input id="emojiSearch" placeholder="絵文字を検索..." oninput="filterEmoji()"></div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
  </div>
</div>

<!-- Image lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="close-lb">✕</span>
  <img id="lightboxImg" onclick="event.stopPropagation()">
</div>

<!-- Calendar Modal -->
<div class="overlay hidden" id="calOverlay">
  <div class="dialog cal-dialog">
    <h3>📅 签到カレンダー</h3>
    <div class="cal-header">
      <button onclick="calMonth(-1)">◀</button>
      <span id="calTitle"></span>
      <button onclick="calMonth(1)">▶</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div><div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow">土</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div style="margin-top:12px;font-size:.82em;color:var(--text2)">
      連続: <strong id="calStreak" style="color:var(--green)">0日</strong> · 累計: <strong id="calTotal" style="color:#ffd700">0日</strong>
    </div>
    <div id="calTimer" style="font-size:.75em;color:var(--text3);margin-top:6px"></div>
    <button class="cal-checkin-btn" id="calCheckBtn" onclick="doCheckin()" disabled>📝 签到 (あと10分)</button>
    <button style="background:#444;margin-top:6px" onclick="document.getElementById('calOverlay').classList.add('hidden')">閉じる</button>
  </div>
</div>

<!-- Dialogs -->
<div class="overlay hidden" id="nameOverlay"><div class="dialog"><h3>👤 名前</h3><input id="nameInput" placeholder="名前を入力" maxlength="20"><button onclick="setName()">OK</button></div></div>
<div class="overlay hidden" id="pwdOverlay"><div class="dialog"><h3>🔒 パスワード</h3><p id="pwdDesc"></p><input type="password" id="pwdInput" placeholder="パスワード"><div class="err" id="pwdErr"></div><button onclick="checkPwd()">入室</button></div></div>
<div class="ctx-menu" id="ctxMenu"></div>
<div class="toast" id="toast"></div>

<script>
// ═══ State ═══
const USER_KEY='line_name', ROOM_ICONS=['💬','🏠','💼','🎮','🎵','📚','🍔','✈️','⚽','🌟'];
const ROOM_COLORS=['#06C755','#3498db','#e74c3c','#9b59b6','#f39c12','#1abc9c','#e91e63','#00bcd4','#ff5722','#607d8b'];

function avatarColor(n){let h=0;for(let i=0;i<n.length;i++)h=((h<<5)-h)+n.charCodeAt(i);return['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722'][Math.abs(h)%10]}

// ═══ Init ═══
if(!userName){document.getElementById('nameOverlay').classList.remove('hidden');document.getElementById('nameInput').focus()}else document.getElementById('nameOverlay').classList.add('hidden');
initSidebar();
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')setName()});
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
document.getElementById('msgInput').addEventListener('input',onInput);
document.getElementById('messages').addEventListener('scroll',onScroll);
document.getElementById('pwdInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPwd()});
initEmoji();

function setName(){const n=document.getElementById('nameInput').value.trim();if(!n)return;userName=n;localStorage.setItem(USER_KEY,n);document.getElementById('nameOverlay').classList.add('hidden');initSidebar()}

// ═══ Sidebar ═══
function initSidebar(){
  const l=document.getElementById('roomList');l.innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');d.className='room-item';d.id='room-item-'+i;d.onclick=()=>selectRoom(String(i));
    d.innerHTML=`<div class="r-avatar" style="background:${ROOM_COLORS[i-1]}">${ROOM_ICONS[i-1]}</div><div class="r-info"><div class="r-name">部屋 ${i}</div><div class="r-last" id="last-${i}"></div></div><div class="r-meta"><span class="r-time" id="time-${i}"></span><span class="r-badge" id="badge-${i}">0</span></div>`;
    l.appendChild(d);
  }
}

// ═══ Select room ═══
async function selectRoom(id){
  if(id===currentRoom&&ws&&ws.readyState===1)return;
  document.querySelectorAll('.room-item').forEach(r=>r.classList.remove('active'));
  document.getElementById('room-item-'+id)?.classList.add('active');
  try{const r=await fetch(`/api/room/${id}/check`);const info=await r.json();
    if(info.hasPassword&&!pwdCache[id]){currentRoom=id;document.getElementById('pwdDesc').textContent=`部屋 ${id} はパスワード保護`;document.getElementById('pwdOverlay').classList.remove('hidden');document.getElementById('pwdInput').value='';document.getElementById('pwdErr').textContent='';document.getElementById('pwdInput').focus();return}
  }catch(e){}
  connect(id);
}
async function checkPwd(){const p=document.getElementById('pwdInput').value.trim();if(!p)return;
  try{const r=await fetch(`/api/room/${currentRoom}/verify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})});
    if(r.ok){pwdCache[currentRoom]=true;document.getElementById('pwdOverlay').classList.add('hidden');connect(currentRoom)}
    else document.getElementById('pwdErr').textContent='⚠️ パスワードが違います'
  }catch(e){document.getElementById('pwdErr').textContent='⚠️ 通信エラー'}
}

// ═══ Connect ═══
function connect(id){
  if(ws){ws.onclose=null;ws.close()}
  currentRoom=id;replyTo=null;cancelReply();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('chatHeader').style.display='flex';
  document.getElementById('messages').style.display='flex';document.getElementById('messages').innerHTML='<div class="msg-system">接続中…</div>';
  document.getElementById('inputBar').style.display='flex';document.getElementById('msgInput').disabled=true;
  document.getElementById('chatName').textContent='部屋 '+id;
  document.getElementById('chatAvatar').style.background=ROOM_COLORS[parseInt(id)-1];
  document.getElementById('chatAvatar').textContent=ROOM_ICONS[parseInt(id)-1];
  document.getElementById('chatMembers').textContent='---';
  if(window.innerWidth<=600)document.getElementById('sidebar').classList.add('hidden-m');
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host+'/ws?room='+encodeURIComponent(id)+'&user='+encodeURIComponent(userName));
  ws.onopen=()=>{document.getElementById('msgInput').disabled=false;document.getElementById('msgInput').focus()};
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='history'){
      isAdmin=msg.isAdmin;roomAdmins=msg.admins||[];onlineUsers=[];
      document.getElementById('chatMembers').textContent=msg.online+'人オンライン';
      document.getElementById('messages').innerHTML='';
      let lastDate='';
      msg.messages.forEach(m=>{const d=new Date(m.time);const ds=d.toLocaleDateString('ja-JP',{month:'long',day:'numeric'});if(ds!==lastDate){addDateDivider(ds);lastDate=ds}appendMsg(m,false)});
      document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
      document.getElementById('badge-'+id).style.display='none';
      // Mark all as read
      ws.send(JSON.stringify({type:'read'}));
    }
    if(msg.type==='chat'){
      appendMsg(msg,true);
      // Check if mentioned
      if(msg.text.includes('@'+userName)&&msg.user!==userName)toast('🔔 @'+msg.user+' があなたをメンションしました');
      // Unread badge
      if(currentRoom!==msg.user){const b=document.getElementById('badge-'+id);if(b){const n=parseInt(b.textContent||'0')+1;b.textContent=n>99?'99+':n;b.style.display='flex'}}
      document.getElementById('last-'+id).textContent=(msg.text.startsWith('[IMAGE]')?'🖼 画像':msg.text).slice(0,30);
      document.getElementById('time-'+id).textContent=new Date(msg.time).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    }
    if(msg.type==='msgDeleted'){const el=document.getElementById('m-'+msg.msgId);if(el){el.classList.add('msg-deleted');const b=el.querySelector('.msg-bubble');if(b)b.textContent='削除されました'}}
    if(msg.type==='readUpdate'){updateReadCounts();document.getElementById('chatMembers').textContent=(msg.online||'?')+'人オンライン'}
    if(msg.type==='system'){document.getElementById('chatMembers').textContent=(msg.online||'?')+'人オンライン';if(msg.admins!==undefined){roomAdmins=msg.admins;isAdmin=roomAdmins.includes(userName)}addSystem(msg.text)}
  };
  ws.onclose=()=>{addSystem('⚠️ 切断');document.getElementById('msgInput').disabled=true};
}

function updateReadCounts(){
  document.querySelectorAll('.msg-wrap.me').forEach(w=>{const m=w.querySelector('.msg-read');if(m)m.textContent='既読';});
}

function backToSidebar(){if(ws){ws.onclose=null;ws.close();ws=null}currentRoom='';document.getElementById('emptyState').style.display='flex';document.getElementById('chatHeader').style.display='none';document.getElementById('messages').style.display='none';document.getElementById('inputBar').style.display='none';document.querySelectorAll('.room-item').forEach(r=>r.classList.remove('active'));if(window.innerWidth<=600)document.getElementById('sidebar').classList.remove('hidden-m')}

// ═══ @Mention ═══
function onInput(){
  const inp=document.getElementById('msgInput');const v=inp.value;const cursor=inp.selectionStart;
  const before=v.slice(0,cursor);const atMatch=before.match(/@(\S*)$/);
  const drop=document.getElementById('mentionDrop');
  if(atMatch){
    const q=atMatch[1].toLowerCase();
    const users=[...new Set(onlineUsers.concat(roomAdmins).filter(u=>u!==userName))];
    const filtered=users.filter(u=>u.toLowerCase().includes(q));
    if(filtered.length){drop.innerHTML=filtered.map(u=>`<div class="m-item" onclick="insertMention('${u}')">${u}</div>`).join('');drop.classList.add('show');return}
  }
  drop.classList.remove('show');
}
function insertMention(u){
  const inp=document.getElementById('msgInput');const v=inp.value;const cursor=inp.selectionStart;
  const before=v.slice(0,cursor);const after=v.slice(cursor);
  const newBefore=before.replace(/@\S*$/,'@'+u+' ');
  inp.value=newBefore+after;inp.focus();inp.selectionStart=inp.selectionEnd=newBefore.length;
  document.getElementById('mentionDrop').classList.remove('show');
}

// ═══ Reply ═══
function setReply(msgId,text,user){
  replyTo=msgId;document.getElementById('replyBar').classList.add('show');
  document.getElementById('replyText').textContent=user+': '+text.slice(0,60);
  document.getElementById('msgInput').focus();
}
function cancelReply(){replyTo=null;document.getElementById('replyBar').classList.remove('show')}

// ═══ Messages ═══
function appendMsg(msg,scroll){
  const area=document.getElementById('messages');const wrap=document.createElement('div');const me=msg.user===userName;
  wrap.className='msg-wrap '+(me?'me':'you');if(msg.deleted)wrap.classList.add('msg-deleted');wrap.id='m-'+msg.id;
  if(!me&&msg.user!==(document.getElementById('messages').lastChild?.querySelector?.('.msg-sender')?.textContent?.replace(' 👑','')||'')){const av=document.createElement('div');av.className='avatar';av.style.background=avatarColor(msg.user);av.textContent=msg.user.charAt(0).toUpperCase();wrap.appendChild(av)}
  const body=document.createElement('div');body.className='msg-body';
  if(!me){const s=document.createElement('div');s.className='msg-sender';s.textContent=msg.user+(roomAdmins.includes(msg.user)?' 👑':'');body.appendChild(s)}
  // Reply preview
  if(msg.replyTo){const rp=document.createElement('div');rp.className='msg-reply';rp.textContent='↩ 返信';rp.onclick=()=>{const el=document.getElementById('m-'+msg.replyTo);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.background='rgba(255,224,102,.1)';setTimeout(()=>el.style.background='',1500)}};body.appendChild(rp)}
  const bubble=document.createElement('div');bubble.className='msg-bubble';
  if(msg.deleted){bubble.textContent='削除されました'}
  else if(msg.text&&msg.text.startsWith('[IMAGE]')){const img=document.createElement('img');img.className='msg-image';img.src=msg.text.slice(7);img.onclick=()=>openLightbox(img.src);bubble.appendChild(img)}
  else{bubble.innerHTML=renderText(msg.text||'')}
  // Touch/long press
  let timer;bubble.addEventListener('touchstart',()=>timer=setTimeout(()=>showCtx(msg),500));bubble.addEventListener('touchend',()=>clearTimeout(timer));bubble.addEventListener('touchmove',()=>clearTimeout(timer));bubble.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(msg)});
  const meta=document.createElement('div');meta.className='msg-meta';
  meta.textContent=new Date(msg.time).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  if(me&&msg.readBy){const rc=document.createElement('span');rc.className='msg-read';rc.textContent=msg.readBy.length>1?'既読'+msg.readBy.length:'';meta.appendChild(rc)}
  body.appendChild(bubble);body.appendChild(meta);wrap.appendChild(body);area.appendChild(wrap);
  if(scroll&&area.scrollTop+area.clientHeight>=area.scrollHeight-200)area.scrollTop=area.scrollHeight;
}

function renderText(t){return t.replace(/@(\w+)/g,'<span class="mention">@$1</span>').replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27FF}\u{FE00}-\u{FEFF}\u{200D}\u{20E3}\u{FE0F}]+/gu,m=>'<span style="font-size:1.3em;vertical-align:middle">'+m+'</span>')}

function addDateDivider(d){const div=document.createElement('div');div.className='date-divider';div.textContent=d;document.getElementById('messages').appendChild(div)}
function addSystem(t){const div=document.createElement('div');div.className='msg-system';div.textContent=t;document.getElementById('messages').appendChild(div);document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight}

// ═══ Scroll ═══
function onScroll(){const m=document.getElementById('messages');const btn=document.getElementById('scrollBtn');const dist=m.scrollHeight-m.scrollTop-m.clientHeight;btn.classList.toggle('show',dist>200)}
function scrollToBottom(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;document.getElementById('scrollBtn').classList.remove('show')}

// ═══ Image lightbox ═══
function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('show')}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});

// ═══ Send ═══
window.send=function(){
  const inp=document.getElementById('msgInput');const t=inp.value.trim();if(!t||!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({type:'chat',text:t,replyTo}));inp.value='';inp.focus();cancelReply();
  scrollToBottom();
};

function sendImage(input){const file=input.files[0];if(!file)return;if(file.size>10*1024*1024){toast('⚠️ 10MB以下');return}const reader=new FileReader();reader.onload=()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'chat',text:'[IMAGE]'+reader.result,replyTo}))};reader.readAsDataURL(file);input.value=''}

// ═══ Context menu ═══
function showCtx(msg){if(msg.deleted)return;const menu=document.getElementById('ctxMenu');const can=(msg.user===userName)||isAdmin;if(!can)return;
  let html='<button onclick="setReply(\''+msg.id+'\',\''+(msg.text||'画像').replace(/'/g,'').slice(0,30)+'\',\''+msg.user+'\')">↩ 返信</button>';
  html+='<button class="danger" onclick="delMsg(\''+msg.id+'\')">🗑 削除</button>';
  if(isAdmin&&msg.user!==userName){html+=roomAdmins.includes(msg.user)?'<button onclick="removeAdmin(\''+msg.user+'\')">⛔ 管理者解除</button>':'<button onclick="makeAdmin(\''+msg.user+'\')">👑 管理者にする</button>'}
  menu.innerHTML=html;menu.classList.add('show');menu.style.right='20px';menu.style.bottom='100px';
  setTimeout(()=>document.addEventListener('click',()=>menu.classList.remove('show'),{once:true}),100);
}
window.delMsg=function(id){if(ws)ws.send(JSON.stringify({type:'delete',msgId:id}));document.getElementById('ctxMenu').classList.remove('show')}
window.makeAdmin=function(u){if(ws)ws.send(JSON.stringify({type:'setAdmin',newAdmin:u}));document.getElementById('ctxMenu').classList.remove('show')}
window.removeAdmin=function(u){if(ws)ws.send(JSON.stringify({type:'removeAdmin',target:u}));document.getElementById('ctxMenu').classList.remove('show')}

// ═══ Emoji ═══
function initEmoji(){document.getElementById('emojiGrid').innerHTML=[...EMOJIS].map(e=>`<span class="emoji-item" onclick="insertEmoji('${e}')">${e}</span>`).join('')}
function toggleEmoji(){const p=document.getElementById('emojiPicker');p.classList.toggle('show')}
function filterEmoji(){const q=document.getElementById('emojiSearch').value;document.getElementById('emojiGrid').innerHTML=[...EMOJIS].filter(e=>!q||e.includes(q)).map(e=>`<span class="emoji-item" onclick="insertEmoji('${e}')">${e}</span>`).join('')}
function insertEmoji(e){const inp=document.getElementById('msgInput');inp.value+=e;inp.focus()}

// ═══ Calendar / Check-in ═══
let calYear, calMonth, checkinData = {}, checkinTotal = 0, checkinElapsed = 0, checkinNeeded = 600, checkinDone = false;

function toggleCalendar() {
  if (!currentRoom) return;
  const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth();
  loadCheckinData();
  document.getElementById('calOverlay').classList.remove('hidden');
}

async function loadCheckinData() {
  if (!currentRoom) return;
  try {
    const r = await fetch(`/api/checkin/${currentRoom}/status?user=${encodeURIComponent(userName)}`);
    const s = await r.json();
    checkinElapsed = s.elapsed; checkinNeeded = s.need; checkinDone = s.alreadyChecked;
    checkinTotal = s.total;
    document.getElementById('calTotal').textContent = checkinTotal + '日';
    document.getElementById('calStreak').textContent = calcStreak() + '日';
    updateCheckinBtn();
    // Load all checkins for calendar display
    const r2 = await fetch(`/api/checkin/${currentRoom}/all`);
    checkinData = await r2.json();
    renderCalendar();
  } catch(e) {}
}

function calcStreak() {
  const dates = (checkinData[userName] || []).sort().reverse();
  if (!dates.length) return 0;
  let streak = 1;
  const oneDay = 86400000;
  for (let i = 0; i < dates.length - 1; i++) {
    const diff = new Date(dates[i]).getTime() - new Date(dates[i+1]).getTime();
    if (diff <= oneDay * 1.5) streak++;
    else break;
  }
  return streak;
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = calYear + '年 ' + (calMonth + 1) + '月';
  const grid = document.getElementById('calGrid');
  const userDates = checkinData[userName] || [];
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day dim"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const checked = userDates.includes(ds);
    const isToday = ds === todayStr;
    html += `<div class="cal-day${checked?' checked':''}${isToday?' today':''}">${d}</div>`;
  }
  grid.innerHTML = html;
}

function calMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function updateCheckinBtn() {
  const btn = document.getElementById('calCheckBtn');
  const left = Math.max(0, checkinNeeded - checkinElapsed);
  if (checkinDone) { btn.textContent = '✅ 本日签到済み'; btn.disabled = true; }
  else if (left <= 0) { btn.textContent = '📝 签到する！'; btn.disabled = false; }
  else { btn.textContent = `⏳ あと${Math.ceil(left/60)}分で签到可能`; btn.disabled = true; }
  document.getElementById('calTimer').textContent = checkinElapsed >= checkinNeeded ? '✅ 10分経過しました' : `⏱ 経過: ${Math.floor(checkinElapsed/60)}分${checkinElapsed%60}秒 / 10分`;
}

// Update timer every 10s
setInterval(async () => {
  if (document.getElementById('calOverlay').classList.contains('hidden')) return;
  if (!currentRoom) return;
  try {
    const r = await fetch(`/api/checkin/${currentRoom}/status?user=${encodeURIComponent(userName)}`);
    const s = await r.json();
    checkinElapsed = s.elapsed; checkinDone = s.alreadyChecked; checkinTotal = s.total;
    updateCheckinBtn();
  } catch(e) {}
}, 10000);

async function doCheckin() {
  try {
    const r = await fetch(`/api/checkin/${currentRoom}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: userName }),
    });
    if (r.ok) {
      const data = await r.json();
      checkinDone = true; checkinTotal = data.total;
      checkinData[userName] = data.all;
      renderCalendar();
      document.getElementById('calTotal').textContent = checkinTotal + '日';
      document.getElementById('calStreak').textContent = calcStreak() + '日';
      updateCheckinBtn();
      toast('✅ 签到成功！' + checkinTotal + '日目');
    } else {
      const e = await r.json();
      toast('⚠️ ' + (e.error === 'already' ? '本日既に签到済み' : '10分経過が必要です'));
    }
  } catch(e) { toast('⚠️ エラー'); }
}

// Auto-reconnect
setInterval(()=>{if(currentRoom&&(!ws||ws.readyState===3))connect(currentRoom)},5000);

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
</script>
