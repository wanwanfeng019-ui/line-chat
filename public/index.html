<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>KabuChat</title>
  <style>
    :root{--line:#06c755;--ink:#17191c;--muted:#8b9098;--border:#eceef1;--panel:#fff;--chat:#8cabd0;--mine:#8bea69;--shadow:0 18px 60px rgba(23,35,48,.14);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif}
    *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#e9edf2;color:var(--ink)}button,input{font:inherit}button{border:0;background:none;color:inherit}.app{height:100dvh;display:flex;max-width:1180px;margin:auto;background:#fff;box-shadow:var(--shadow);overflow:hidden}.sidebar{width:360px;flex:none;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:5}.top{height:64px;display:flex;align-items:center;padding:0 18px;gap:12px;border-bottom:1px solid var(--border)}.brand{font-size:21px;font-weight:800;letter-spacing:-.5px;flex:1}.profile{width:38px;height:38px;border-radius:14px;background:linear-gradient(145deg,#20dc76,#06ad4d);display:grid;place-items:center;color:#fff;font-weight:800}.icon{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:20px;cursor:pointer}.icon:active{background:#f1f3f5;transform:scale(.94)}.search{margin:12px 16px 8px;height:38px;border-radius:12px;background:#f3f4f6;display:flex;align-items:center;padding:0 12px;color:#9aa0a8}.search input{width:100%;border:0;outline:0;background:transparent;margin-left:8px;font-size:14px}.section{padding:9px 18px 5px;font-size:12px;color:#999;font-weight:700;letter-spacing:.7px}.rooms{overflow:auto;flex:1}.room{height:76px;padding:9px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative}.room:hover,.room.active{background:#f5f7f8}.avatar{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;color:#fff;font-size:22px;font-weight:800;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}.room-main{min-width:0;flex:1}.room-title-row{display:flex;align-items:center;gap:6px}.room-title{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pin{font-size:11px;color:#aaa}.preview{font-size:13px;color:#969ba3;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.room-side{align-self:stretch;padding-top:8px;text-align:right}.time{font-size:11px;color:#b1b5ba}.badge{display:none;margin:8px 0 0 auto;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:var(--line);color:#fff;font-size:11px;font-weight:800;place-items:center}.badge.show{display:grid}.chat{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;background:var(--chat)}.chat-head{height:64px;padding:0 14px;background:rgba(255,255,255,.96);display:flex;align-items:center;gap:10px;box-shadow:0 1px 0 rgba(0,0,0,.08);z-index:3}.back{display:none}.head-avatar{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;color:#fff;font-weight:800}.head-info{min-width:0;flex:1}.head-name{font-weight:800;font-size:16px}.status{font-size:12px;color:#8d9299;margin-top:2px}.head-action{width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}.head-action:active{background:#f1f3f5}.messages{flex:1;overflow:auto;padding:20px clamp(14px,3vw,34px);scroll-behavior:smooth;background-color:var(--chat);background-image:radial-gradient(circle at 12% 22%,rgba(255,255,255,.12) 0 1px,transparent 2px),radial-gradient(circle at 82% 68%,rgba(255,255,255,.1) 0 1.5px,transparent 2.5px);background-size:38px 38px}.day{text-align:center;margin:5px auto 18px;background:rgba(54,72,94,.33);color:white;width:max-content;padding:5px 11px;border-radius:15px;font-size:11px}.system{text-align:center;color:rgba(255,255,255,.9);font-size:11px;margin:12px auto;text-shadow:0 1px 1px rgba(0,0,0,.16)}.msg{display:flex;align-items:flex-end;gap:8px;margin:5px 0;max-width:78%}.msg.me{margin-left:auto;flex-direction:row-reverse}.msg-avatar{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;flex:none}.content{min-width:0}.sender{font-size:11px;color:white;margin:0 0 4px 3px;text-shadow:0 1px 1px rgba(0,0,0,.2)}.bubble{background:#fff;padding:9px 12px;border-radius:5px 16px 16px 16px;font-size:15px;line-height:1.45;word-break:break-word;box-shadow:0 1px 1px rgba(0,0,0,.08);position:relative}.me .bubble{background:var(--mine);border-radius:16px 5px 16px 16px}.bubble.deleted{color:#999;font-style:italic}.msg-img{display:block;max-width:min(280px,58vw);max-height:320px;border-radius:12px}.meta{font-size:10px;color:rgba(255,255,255,.9);white-space:nowrap;padding-bottom:3px;text-align:right}.reply-preview{font-size:12px;opacity:.65;border-left:3px solid #4abf61;padding:4px 7px;margin-bottom:7px;background:rgba(0,0,0,.05);border-radius:4px}.composer-wrap{background:#fff;padding-bottom:env(safe-area-inset-bottom)}.reply-bar{display:none;height:42px;align-items:center;padding:0 14px;border-top:1px solid var(--border);font-size:12px;color:#777}.reply-bar.show{display:flex}.reply-bar span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.composer{min-height:58px;display:flex;align-items:flex-end;gap:5px;padding:8px 10px;border-top:1px solid var(--border)}.composer .tool{width:38px;height:40px;display:grid;place-items:center;font-size:22px;cursor:pointer;flex:none}.input-shell{flex:1;min-width:0;display:flex;align-items:flex-end;background:#f1f2f4;border-radius:22px;padding:3px 5px 3px 14px}.input-shell textarea{border:0;outline:0;background:transparent;resize:none;max-height:100px;min-height:34px;line-height:22px;padding:6px 0;width:100%;font-size:15px}.send{width:34px;height:34px;border-radius:50%;background:var(--line);color:#fff;font-size:18px;display:grid;place-items:center;cursor:pointer;flex:none}.send:disabled{background:#c9ced3}.empty{position:absolute;inset:0;background:#f7f8fa;display:grid;place-items:center;text-align:center;color:#a0a5ad;z-index:4}.empty-logo{width:78px;height:78px;border-radius:28px;background:#fff;display:grid;place-items:center;font-size:34px;box-shadow:0 12px 35px rgba(25,40,55,.1);margin:auto auto 15px}.modal{position:fixed;inset:0;background:rgba(16,22,30,.45);backdrop-filter:blur(7px);display:grid;place-items:center;z-index:20;padding:20px}.modal.hidden{display:none}.card{width:min(380px,100%);background:#fff;border-radius:26px;padding:30px 24px;box-shadow:var(--shadow);text-align:center}.login-mark{width:68px;height:68px;border-radius:24px;background:var(--line);color:#fff;display:grid;place-items:center;font-size:32px;margin:0 auto 18px}.card h2{margin:0;font-size:23px}.card p{margin:8px 0 22px;color:#969ba3;font-size:13px}.field{width:100%;height:50px;border-radius:14px;border:1px solid #e2e5e8;padding:0 15px;outline:0;font-size:15px}.field:focus{border-color:var(--line);box-shadow:0 0 0 3px rgba(6,199,85,.1)}.primary{width:100%;height:50px;border-radius:14px;background:var(--line);color:#fff;font-weight:800;margin-top:12px;cursor:pointer}.secondary{width:100%;height:46px;color:#666;cursor:pointer}.toast{position:fixed;left:50%;top:calc(18px + env(safe-area-inset-top));transform:translate(-50%,-20px);background:rgba(25,28,32,.9);color:#fff;padding:10px 17px;border-radius:22px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:50}.toast.show{opacity:1;transform:translate(-50%,0)}.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;place-items:center;z-index:40}.lightbox.show{display:grid}.lightbox img{max-width:94vw;max-height:90vh}.lightbox button{position:absolute;right:18px;top:18px;color:#fff;font-size:28px}.feed-card{background:#fff;border-radius:18px;padding:16px;margin:8px 0;box-shadow:0 4px 16px rgba(36,54,73,.12);cursor:pointer}.feed-title{font-weight:800;line-height:1.4}.feed-copy{font-size:13px;color:#777;margin-top:7px;line-height:1.55}.feed-source{font-size:11px;color:var(--line);margin-top:10px}
    @media(max-width:700px){body{background:#fff}.app{width:100%;box-shadow:none}.sidebar{position:absolute;inset:0;width:100%;border:0;transition:transform .28s cubic-bezier(.2,.8,.2,1)}.sidebar.away{transform:translateX(-100%)}.chat{width:100%}.back{display:grid}.top,.chat-head{padding-top:env(safe-area-inset-top);height:calc(60px + env(safe-area-inset-top))}.top{align-items:flex-end;padding-bottom:10px}.chat-head{align-items:flex-end;padding-bottom:7px}.messages{padding-bottom:16px}.msg{max-width:88%}.empty{display:none}.composer .tool.emoji{display:none}}
    .profile{cursor:pointer;background-size:cover;background-position:center}.card{max-height:90dvh;overflow:auto}.avatar-photo{background-image:url('/room-avatars.png')!important;background-size:500% 200%!important;font-size:0!important}.avatar-photo.a1{background-position:0 0!important}.avatar-photo.a2{background-position:25% 0!important}.avatar-photo.a3{background-position:50% 0!important}.avatar-photo.a4{background-position:75% 0!important}.avatar-photo.a5{background-position:100% 0!important}.avatar-photo.a6{background-position:0 100%!important}.avatar-photo.a7{background-position:25% 100%!important}.avatar-photo.a8{background-position:50% 100%!important}.avatar-photo.a9{background-position:75% 100%!important}.avatar-photo.a10{background-position:100% 100%!important}.avatar-photo:hover{filter:brightness(.94)}.info-cover{height:116px;margin:-30px -24px 0;background:linear-gradient(135deg,#172b4d,#235c74)}.info-avatar{width:92px;height:92px;border-radius:28px;margin:-48px auto 12px;border:5px solid #fff;position:relative;box-shadow:0 7px 22px rgba(0,0,0,.16)}.info-label{font-size:12px;color:var(--line);font-weight:800;margin-top:6px}.info-bio{text-align:left;background:#f6f8f9;border-radius:16px;padding:15px;margin:18px 0 12px;font-size:14px;color:#555;line-height:1.7}.info-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.info-stat{background:#f5f7f8;border-radius:13px;padding:11px 4px}.info-stat b{display:block;font-size:16px}.info-stat span{font-size:10px;color:#999}.profile-row{text-align:left;padding:12px 0;border-bottom:1px solid var(--border)}.profile-row span{color:#999;font-size:12px}.profile-row b{display:block;margin-top:3px;font-size:14px}
  </style>
</head>
<body>
<main class="app">
  <aside class="sidebar" id="sidebar"><header class="top"><button class="profile" id="profile" onclick="openProfile()" aria-label="个人中心">K</button><div class="brand">聊天</div><button class="icon" aria-label="新聊天">✎</button><button class="icon" onclick="openProfile()" aria-label="个人中心设置">⚙</button></header><label class="search">⌕<input id="search" placeholder="搜索聊天或消息"></label><div class="section">最近聊天</div><div class="rooms" id="rooms"></div></aside>
  <section class="chat">
    <div class="empty" id="empty"><div><div class="empty-logo">💬</div><b>选择一个聊天</b><div style="font-size:13px;margin-top:6px">和朋友开始轻松交流</div></div></div>
    <header class="chat-head"><button class="icon back" onclick="goBack()" aria-label="返回">‹</button><div class="head-avatar" id="headAvatar">1</div><div class="head-info"><div class="head-name" id="headName">聊天室</div><div class="status" id="status">正在连接…</div></div><button class="head-action" aria-label="搜索">⌕</button><button class="head-action" onclick="toast('群聊设置即将开放')" aria-label="菜单">☰</button></header>
    <div class="messages" id="messages"></div>
    <div class="composer-wrap"><div class="reply-bar" id="replyBar"><span id="replyText"></span><button onclick="cancelReply()">✕</button></div><div class="composer"><button class="tool" onclick="document.getElementById('imageInput').click()" aria-label="发送图片">＋</button><input hidden id="imageInput" type="file" accept="image/*" onchange="sendImage(this)"><button class="tool emoji" onclick="insertEmoji()" aria-label="表情">☺</button><div class="input-shell"><textarea id="input" rows="1" maxlength="2000" placeholder="输入消息" disabled></textarea><button class="send" id="send" onclick="sendMessage()" disabled aria-label="发送">➤</button></div></div></div>
  </section>
</main>
<div class="modal" id="login"><div class="card"><div class="login-mark">💬</div><h2>欢迎来到 KabuChat</h2><p>输入昵称，马上开始聊天</p><input class="field" id="nameInput" maxlength="20" placeholder="你的昵称"><button class="primary" onclick="saveName()">开始聊天</button><button class="secondary" onclick="location.href='/api/line-login'">使用 LINE 登录</button></div></div>
<div class="modal hidden" id="password"><div class="card"><div class="login-mark">🔒</div><h2>受保护的聊天室</h2><p>请输入房间密码</p><input class="field" id="passwordInput" type="password" placeholder="房间密码"><button class="primary" onclick="verifyPassword()">进入聊天室</button><button class="secondary" onclick="closePassword()">取消</button></div></div>
<div class="modal hidden" id="roomInfo" onclick="closeModal(event,'roomInfo')"><div class="card"><div class="info-cover"></div><div class="info-avatar avatar-photo" id="infoAvatar"></div><h2 id="infoTitle"></h2><div class="info-label" id="infoLabel"></div><div class="info-bio" id="infoBio"></div><div class="info-stats"><div class="info-stat"><b id="infoMembers">2.8万</b><span>关注成员</span></div><div class="info-stat"><b id="infoYears">12年</b><span>创立时间</span></div><div class="info-stat"><b id="infoPosts">8,600</b><span>精选内容</span></div></div><button class="primary" onclick="enterFromInfo()">进入房间</button><button class="secondary" onclick="$('roomInfo').classList.add('hidden')">关闭</button></div></div>
<div class="modal hidden" id="profileCenter" onclick="closeModal(event,'profileCenter')"><div class="card"><div class="info-cover" style="background:linear-gradient(135deg,#00a848,#21d976)"></div><div class="info-avatar" style="background:#fff;display:grid;place-items:center;font-size:34px;font-weight:800;color:#06c755" id="profileAvatar">K</div><h2>我的个人中心</h2><div class="info-label">KABUCHAT ID · 在线</div><div class="profile-row"><span>昵称</span><b id="profileNickname">—</b></div><div class="profile-row"><span>个性签名</span><b>关注长期价值，也享受即时交流。</b></div><div class="profile-row"><span>账户与隐私</span><b>消息、登录方式与隐私设置</b></div><button class="primary" onclick="editNickname()">修改昵称</button><button class="secondary" onclick="$('profileCenter').classList.add('hidden')">关闭</button></div></div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><button>✕</button><img id="lightboxImage" alt="聊天图片" onclick="event.stopPropagation()"></div><div class="toast" id="toast"></div>
<script>
const colors=['#06c755','#4c8bf5','#ff6b6b','#9b62e7','#f7a531','#22b8aa','#ec5f9d','#3ca9d8','#fb7047','#67788a'];
const roomNames=['投资交流','股票研究室','自由聊天','财经快讯','科技资讯','市场动态','全球财经','AI 与创新','公司新闻','重要提醒'];
const roomIcons=['投','股','聊','财','科','市','球','AI','企','!'];
const roomProfiles=[
 {label:'全球价值投资社区',bio:'由全球知名投资人及专业研究者共同发起，长期分享价值投资、资产配置与企业研究方法。成员曾获得国际投资论坛年度卓越研究团队、亚洲财富管理创新奖等荣誉。',members:'3.2万',years:'14年',posts:'9,860'},
 {label:'专业股票研究社群',bio:'聚集证券分析师、基金经理与上市公司研究员，专注财报拆解、行业周期和公司基本面。研究成果多次入选年度最佳投资策略报告。',members:'2.6万',years:'11年',posts:'8,420'},
 {label:'高质量自由交流空间',bio:'面向全球华语用户的轻松交流社区，分享生活、观点与灵感。社区坚持真实、友善、有价值的讨论氛围。',members:'4.8万',years:'9年',posts:'12.6万'},
 {label:'7×24 小时财经信息站',bio:'汇集全球市场实时信息、重要政策与宏观数据，由专业编辑团队筛选内容，帮助成员快速理解影响市场的关键事件。',members:'6.1万',years:'10年',posts:'3.8万'},
 {label:'前沿科技观察室',bio:'关注人工智能、半导体、机器人与消费电子，由科技行业从业者和研究机构成员共同维护。',members:'2.9万',years:'8年',posts:'1.9万'},
 {label:'全球市场策略中心',bio:'追踪股票、债券、外汇与大宗商品市场，提供跨资产观察和风险提示，服务专业与长期投资者。',members:'2.2万',years:'12年',posts:'2.4万'},
 {label:'全球宏观财经智库',bio:'覆盖亚洲、北美与欧洲的重要财经变化，连接全球投资者、企业管理者与宏观研究人员。',members:'3.7万',years:'13年',posts:'2.8万'},
 {label:'AI 创新者社区',bio:'为工程师、创业者与产品设计者提供人工智能趋势、案例和实践交流，鼓励负责任的技术创新。',members:'5.3万',years:'7年',posts:'3.1万'},
 {label:'上市公司与产业动态',bio:'关注企业公告、商业模式与产业合作，为投资研究提供清晰、可验证的公司信息。',members:'1.8万',years:'9年',posts:'1.6万'},
 {label:'重要风险提醒频道',bio:'集中发布市场风险、服务公告与紧急提示。内容经过核验，并优先呈现最需要用户关注的信息。',members:'8.9万',years:'10年',posts:'6,200'}
];
const feedRooms=new Set(['4','5','6','7','8','9','10']);
let userName=localStorage.getItem('line_name')||'', currentRoom='', pendingRoom='', ws=null, replyTo=null, isAdmin=false, admins=[], passwordCache={};
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function avatarColor(name){let n=0;for(const c of name)n=(n*31+c.charCodeAt(0))|0;return colors[Math.abs(n)%colors.length]}
function init(){const q=new URLSearchParams(location.search);if(q.get('token')){userName=q.get('name')||userName;localStorage.setItem('line_name',userName);history.replaceState(null,'','/')} $('login').classList.toggle('hidden',!!userName);$('profile').textContent=(userName||'K')[0].toUpperCase();renderRooms();}
function saveName(){const n=$('nameInput').value.trim();if(!n)return toast('请输入昵称');userName=n;localStorage.setItem('line_name',n);$('profile').textContent=n[0].toUpperCase();$('login').classList.add('hidden')}
function renderRooms(filter=''){const list=$('rooms');list.innerHTML='';roomNames.forEach((name,i)=>{if(filter&&!name.toLowerCase().includes(filter.toLowerCase()))return;const id=String(i+1),d=document.createElement('div');d.className='room'+(id===currentRoom?' active':'');d.id='room-'+id;d.onclick=()=>selectRoom(id);d.innerHTML=`<button class="avatar avatar-photo a${id}" onclick="event.stopPropagation();showRoomInfo('${id}')" aria-label="查看${name}简介">${roomIcons[i]}</button><div class="room-main"><div class="room-title-row"><div class="room-title">${name}</div>${i<3?'<span class="pin">⌁</span>':''}</div><div class="preview" id="preview-${id}">${i<3?'点击进入聊天室':'查看最新内容'}</div></div><div class="room-side"><div class="time" id="time-${id}"></div><div class="badge" id="badge-${id}">0</div></div>`;list.appendChild(d)})}
function showRoomInfo(id){pendingRoom=id;const i=Number(id)-1,p=roomProfiles[i];$('infoAvatar').className=`info-avatar avatar-photo a${id}`;$('infoTitle').textContent=roomNames[i];$('infoLabel').textContent=p.label;$('infoBio').textContent=p.bio;$('infoMembers').textContent=p.members;$('infoYears').textContent=p.years;$('infoPosts').textContent=p.posts;$('roomInfo').classList.remove('hidden')}
function enterFromInfo(){$('roomInfo').classList.add('hidden');selectRoom(pendingRoom)}
function openProfile(){$('profileAvatar').textContent=(userName||'K')[0].toUpperCase();$('profileNickname').textContent=userName||'未设置';$('profileCenter').classList.remove('hidden')}
function editNickname(){const n=prompt('请输入新的昵称',userName);if(!n?.trim())return;userName=n.trim().slice(0,20);localStorage.setItem('line_name',userName);$('profile').textContent=userName[0].toUpperCase();$('profileAvatar').textContent=userName[0].toUpperCase();$('profileNickname').textContent=userName;toast('昵称已更新')}
function closeModal(e,id){if(e.target.id===id)$(id).classList.add('hidden')}
$('search').addEventListener('input',e=>renderRooms(e.target.value));$('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveName()});$('passwordInput').addEventListener('keydown',e=>{if(e.key==='Enter')verifyPassword()});
async function selectRoom(id){if(feedRooms.has(id))return openFeed(id);pendingRoom=id;try{const r=await fetch(`/api/room/${id}/check`),data=await r.json();if(data.hasPassword&&!passwordCache[id]){$('password').classList.remove('hidden');$('passwordInput').focus();return}}catch{} connectRoom(id)}
function closePassword(){$('password').classList.add('hidden');pendingRoom=''}
async function verifyPassword(){const password=$('passwordInput').value.trim();if(!password)return;const r=await fetch(`/api/room/${pendingRoom}/verify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});if(!r.ok)return toast('密码不正确');passwordCache[pendingRoom]=true;$('password').classList.add('hidden');connectRoom(pendingRoom)}
function enterRoom(id){currentRoom=id;$('empty').style.display='none';$('sidebar').classList.add('away');document.querySelectorAll('.room').forEach(x=>x.classList.toggle('active',x.id==='room-'+id));$('headAvatar').className=`head-avatar avatar-photo a${id}`;$('headAvatar').textContent=roomIcons[id-1];$('headName').textContent=roomNames[id-1];$('messages').innerHTML='';$('badge-'+id)?.classList.remove('show')}
function connectRoom(id){if(ws){ws.onclose=null;ws.close()}enterRoom(id);$('status').textContent='正在连接…';$('input').disabled=true;$('send').disabled=true;const proto=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(`${proto}//${location.host}/ws?room=${encodeURIComponent(id)}&user=${encodeURIComponent(userName)}`);ws.onopen=()=>{$('status').textContent='已连接';$('input').disabled=false;updateSend()};ws.onmessage=e=>handle(JSON.parse(e.data));ws.onclose=()=>{$('status').textContent='连接已断开';$('input').disabled=true;$('send').disabled=true}}
function handle(m){if(m.type==='history'){isAdmin=m.isAdmin;admins=m.admins||[];$('status').textContent=`${m.online} 人在线`;$('messages').innerHTML='';let date='';m.messages.forEach(x=>{const d=new Date(x.time).toLocaleDateString('zh-CN',{month:'long',day:'numeric'});if(d!==date){addDay(d);date=d}appendMessage(x)});scrollBottom();ws.send(JSON.stringify({type:'read'}))}else if(m.type==='chat'){appendMessage(m);$('preview-'+currentRoom).textContent=m.text.startsWith('[IMAGE]')?'[图片]':m.text;$('time-'+currentRoom).textContent=time(m.time);scrollBottom()}else if(m.type==='system'){if(m.admins){admins=m.admins;isAdmin=admins.includes(userName)}$('status').textContent=`${m.online||0} 人在线`;addSystem(m.text)}else if(m.type==='msgDeleted'){const b=document.querySelector(`#m-${m.msgId} .bubble`);if(b){b.className='bubble deleted';b.textContent='此消息已删除'}}else if(m.type==='readUpdate'){$('status').textContent=`${m.online||0} 人在线`}}
function addDay(t){const d=document.createElement('div');d.className='day';d.textContent=t;$('messages').appendChild(d)}function addSystem(t){const d=document.createElement('div');d.className='system';d.textContent=t;$('messages').appendChild(d);scrollBottom()}function time(t){return new Date(t).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false})}
function appendMessage(m){const me=m.user===userName,w=document.createElement('div');w.className='msg'+(me?' me':'');w.id='m-'+m.id;let body='';if(m.deleted)body='<div class="bubble deleted">此消息已删除</div>';else if(m.text?.startsWith('[IMAGE]'))body=`<div class="bubble" style="padding:3px"><img class="msg-img" src="${m.text.slice(7)}" alt="聊天图片"></div>`;else body=`<div class="bubble">${m.replyTo?'<div class="reply-preview">回复了一条消息</div>':''}${esc(m.text).replace(/\n/g,'<br>').replace(/(@[\w\u4e00-\u9fa5]+)/g,'<b style="color:#168bd2">$1</b>')}</div>`;w.innerHTML=`${!me?`<div class="msg-avatar" style="background:${avatarColor(m.user)}">${esc(m.user?.[0]||'?')}</div>`:''}<div class="content">${!me?`<div class="sender">${esc(m.user)}${admins.includes(m.user)?' 👑':''}</div>`:''}${body}</div><div class="meta">${me&&m.readBy?.length>1?'已读<br>':''}${time(m.time)}</div>`;const bubble=w.querySelector('.bubble');if(!m.deleted){bubble.onclick=()=>{if(m.text?.startsWith('[IMAGE]')){ $('lightboxImage').src=m.text.slice(7);$('lightbox').classList.add('show')}else setReply(m)};bubble.oncontextmenu=e=>{e.preventDefault();if(me||isAdmin){if(confirm('删除这条消息？'))ws.send(JSON.stringify({type:'delete',msgId:m.id}))}}}$('messages').appendChild(w)}
function setReply(m){replyTo=m.id;$('replyText').textContent=`回复 ${m.user}：${m.text?.startsWith('[IMAGE]')?'图片':m.text}`;$('replyBar').classList.add('show');$('input').focus()}function cancelReply(){replyTo=null;$('replyBar').classList.remove('show')}
function sendMessage(){const text=$('input').value.trim();if(!text||!ws||ws.readyState!==1)return;ws.send(JSON.stringify({type:'chat',text,replyTo}));$('input').value='';$('input').style.height='auto';cancelReply();updateSend()}
function sendImage(el){const f=el.files[0];if(!f)return;if(f.size>10*1024*1024)return toast('图片不能超过 10MB');const r=new FileReader();r.onload=()=>ws?.send(JSON.stringify({type:'chat',text:'[IMAGE]'+r.result,replyTo}));r.readAsDataURL(f);el.value=''}
function insertEmoji(){$('input').value+='😊';$('input').focus();updateSend()}function updateSend(){$('send').disabled=!$('input').value.trim()||!ws||ws.readyState!==1}function scrollBottom(){requestAnimationFrame(()=>{$('messages').scrollTop=$('messages').scrollHeight})}
$('input').addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,100)+'px';updateSend()});$('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&innerWidth>700){e.preventDefault();sendMessage()}});
async function openFeed(id){if(ws){ws.onclose=null;ws.close();ws=null}enterRoom(id);$('status').textContent='资讯频道';$('input').disabled=true;$('send').disabled=true;addSystem('正在获取最新内容…');try{const r=await fetch('/api/feed/'+id),data=await r.json();$('messages').innerHTML='';data.items.forEach(item=>{const d=document.createElement('article');d.className='feed-card';d.innerHTML=`<div class="feed-title">${esc(item.title)}</div><div class="feed-copy">${esc(item.content)}</div><div class="feed-source">${esc(item.source)} · ${time(item.pubDate)}</div>`;d.onclick=()=>item.link&&item.link!=='#'&&window.open(item.link,'_blank','noopener');$('messages').appendChild(d)});if(!data.items.length)addSystem('暂时没有新内容')}catch{addSystem('内容加载失败，请稍后重试')}}
function goBack(){if(ws){ws.onclose=null;ws.close();ws=null}currentRoom='';$('sidebar').classList.remove('away');cancelReply()}function toast(t){const el=$('toast');el.textContent=t;el.classList.add('show');clearTimeout(el._timer);el._timer=setTimeout(()=>el.classList.remove('show'),1800)}
init();
</script>
</body>
</html>
