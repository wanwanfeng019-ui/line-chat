<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LINE風 グループチャット</title>
<style>
:root {
  --line-green: #06C755;
  --line-dark: #05a348;
  --bg: #849eb7;
  --chat-bg: #7a9abb;
  --bubble-self: #8de896;
  --bubble-other: #fff;
  --text: #111;
  --text-light: #666;
  --border: #ddd;
  --font: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Header ── */
.header {
  background: var(--line-green);
  color: #fff;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  z-index: 10;
  flex-shrink: 0;
}
.header .back { font-size: 1.2em; cursor: pointer; text-decoration: none; color: #fff; }
.header .room-title { font-size: 1em; font-weight: 700; flex:1; }
.header .online-badge {
  background: rgba(255,255,255,.25); padding: 3px 10px;
  border-radius: 12px; font-size: 0.75em;
}

/* ── Chat area ── */
.chat-area {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  background: var(--chat-bg);
  -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column; gap: 6px;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 4px; }

/* ── Messages ── */
.msg-wrap { display: flex; flex-direction: column; max-width: 80%; animation: msgIn .2s ease; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.msg-wrap.self { align-self: flex-end; align-items: flex-end; }
.msg-wrap.other { align-self: flex-start; align-items: flex-start; }

.msg-user {
  font-size: 0.68em; color: rgba(0,0,0,.5); padding: 0 8px; margin-bottom: 1px;
}
.msg-bubble {
  padding: 8px 14px; border-radius: 18px;
  font-size: 0.92em; line-height: 1.45; word-break: break-word;
  position: relative;
}
.msg-wrap.self .msg-bubble {
  background: var(--bubble-self);
  border-bottom-right-radius: 4px;
}
.msg-wrap.other .msg-bubble {
  background: var(--bubble-other);
  border-bottom-left-radius: 4px;
}
.msg-time {
  font-size: 0.62em; color: rgba(0,0,0,.4); padding: 2px 8px 0;
}

/* System message */
.msg-system {
  align-self: center; font-size: 0.7em; color: rgba(255,255,255,.8);
  background: rgba(0,0,0,.15); padding: 4px 14px; border-radius: 10px;
  margin: 4px 0;
}

/* ── Input bar ── */
.input-bar {
  background: #f5f5f5; padding: 8px 10px;
  display: flex; gap: 8px; align-items: center;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.input-bar input {
  flex: 1; padding: 10px 16px; border-radius: 22px;
  border: 1px solid var(--border); font-size: 0.92em; outline: none;
  font-family: var(--font); background: #fff;
}
.input-bar input:focus { border-color: var(--line-green); }
.input-bar button {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: var(--line-green); color: #fff; font-size: 1.2em;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.input-bar button:active { transform: scale(.9); background: var(--line-dark); }

/* ── Setup overlay ── */
.overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,.5); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.overlay.hidden { display: none; }
.setup-card {
  background: #fff; border-radius: 20px; padding: 28px 24px;
  width: 90%; max-width: 360px; text-align: center;
}
.setup-card h2 { font-size: 1.2em; margin-bottom: 6px; }
.setup-card p { font-size: 0.82em; color: #888; margin-bottom: 18px; }
.setup-card input {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 1px solid #ddd; font-size: 1em; margin-bottom: 8px;
  outline: none; font-family: var(--font); text-align: center;
}
.setup-card input:focus { border-color: var(--line-green); }
.setup-card .room-id {
  font-size: 0.78em; color: #aaa; margin-bottom: 14px;
}
.setup-card button {
  width: 100%; padding: 14px; border-radius: 14px; border: none;
  background: var(--line-green); color: #fff; font-size: 1em; font-weight: 700;
  cursor: pointer;
}
.setup-card button:active { background: var(--line-dark); }

/* ── Share bar ── */
.share-bar {
  background: #fff; padding: 10px 12px;
  display: flex; gap: 8px; align-items: center;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; font-size: 0.78em;
}
.share-bar .share-link {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: #555; background: #f0f0f0; padding: 6px 10px; border-radius: 6px;
}
.share-bar button {
  padding: 6px 14px; border-radius: 8px; border: none;
  background: var(--line-green); color: #fff; font-size: 0.82em;
  cursor: pointer; flex-shrink: 0;
}
.share-bar button:active { background: var(--line-dark); }

/* ── Toast ── */
.toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.8); color: #fff; padding: 8px 20px;
  border-radius: 20px; font-size: 0.85em; z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Setup Overlay -->
<div class="overlay" id="overlay">
  <div class="setup-card">
    <h2>💬 チャットに参加</h2>
    <p>LINE風グループチャット</p>
    <input id="nameInput" placeholder="あなたの名前" maxlength="20" autocomplete="off">
    <div class="room-id">部屋: <strong id="roomDisplay"></strong></div>
    <button onclick="joinChat()">参加する</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <span class="back">←</span>
  <span class="room-title" id="roomTitle">チャット</span>
  <span class="online-badge" id="onlineBadge">👤 0</span>
</div>

<!-- Share -->
<div class="share-bar">
  <span class="share-link" id="shareLink">---</span>
  <button onclick="copyLink()">📋 リンクをコピー</button>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">
  <div class="msg-system">ようこそ！メッセージを送ってみましょう ✨</div>
</div>

<!-- Input -->
<div class="input-bar">
  <input id="msgInput" placeholder="メッセージを入力…" maxlength="2000" autocomplete="off">
  <button onclick="sendMessage()">➤</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Parse room/user from URL ──
const urlParams = new URLSearchParams(location.search);
const ROOM = urlParams.get('room') || location.pathname.replace(/^\/+/,'') || 'chat';
const USER_KEY = 'linechat_user_' + ROOM;
let userName = localStorage.getItem(USER_KEY) || '';
const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';

// Display room info
document.getElementById('roomDisplay').textContent = ROOM;
document.getElementById('roomTitle').textContent = ROOM;
document.getElementById('shareLink').textContent = location.origin + '?room=' + ROOM;
document.getElementById('nameInput').value = userName;

// Show/hide overlay
if (userName) {
  document.getElementById('overlay').classList.add('hidden');
  connectWS();
}

// ── Join ──
window.joinChat = function() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return alert('名前を入力してください');
  userName = name;
  localStorage.setItem(USER_KEY, name);
  document.getElementById('overlay').classList.add('hidden');
  connectWS();
};

// ── WebSocket ──
let ws;
function connectWS() {
  ws = new WebSocket(wsProtocol + '//' + location.host + '/ws?room=' + encodeURIComponent(ROOM) + '&user=' + encodeURIComponent(userName));

  ws.onopen = () => updateShareLink();

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    const area = document.getElementById('chatArea');

    if (msg.type === 'history') {
      document.getElementById('onlineBadge').textContent = '👤 ' + msg.online;
      area.innerHTML = '<div class="msg-system">ようこそ！メッセージを送ってみましょう ✨</div>';
      msg.messages.forEach(m => appendMessage(m, false));
      area.scrollTop = area.scrollHeight;
    }

    if (msg.type === 'chat') appendMessage(msg, true);
    if (msg.type === 'system') {
      document.getElementById('onlineBadge').textContent = '👤 ' + (msg.online || '?');
      const el = document.createElement('div');
      el.className = 'msg-system';
      el.textContent = msg.text;
      document.getElementById('chatArea').appendChild(el);
      scrollDown();
    }
  };

  ws.onclose = () => {
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.textContent = '⚠️ 接続が切れました。リロードしてください。';
    document.getElementById('chatArea').appendChild(el);
    scrollDown();
  };
}

// ── Send message ──
window.sendMessage = function() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'chat', text }));
  input.value = '';
  input.focus();
};

// Enter key
document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Append message to DOM ──
function appendMessage(msg, scroll) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  const isSelf = msg.user === userName;
  wrap.className = 'msg-wrap ' + (isSelf ? 'self' : 'other');

  const uname = document.createElement('div');
  uname.className = 'msg-user';
  uname.textContent = isSelf ? '' : msg.user;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  const d = new Date(msg.time);
  time.textContent = d.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' });

  wrap.appendChild(uname);
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  area.appendChild(wrap);

  if (scroll) scrollDown();
}

function scrollDown() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

// ── Copy link ──
function updateShareLink() {
  const url = location.origin + '?room=' + ROOM;
  document.getElementById('shareLink').textContent = url;
}

window.copyLink = function() {
  const url = location.origin + '?room=' + ROOM;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => toast('✅ リンクをコピーしました！'));
  } else {
    const ta = document.createElement('textarea'); ta.value = url;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('✅ リンクをコピーしました！');
  }
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

// Name input Enter
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') joinChat();
});
</script>
</body>
</html>
