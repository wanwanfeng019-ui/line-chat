<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 - LINE風チャット</title>
<style>
:root {
  --line-green: #06C755;
  --bg: #f5f6f8; --card: #fff; --border: #e0e0e0;
  --text: #333; --muted: #888; --danger: #e74c3c;
  --font: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 20px; }
.container { max-width: 960px; margin: 0 auto; }

h1 { font-size: 1.4em; margin-bottom: 4px; }
h1 span { color: var(--line-green); }
.sub { color: var(--muted); font-size: 0.82em; margin-bottom: 20px; }

.login-card {
  background: var(--card); border-radius: 16px; padding: 40px 30px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.06); max-width: 360px; margin: 60px auto;
}
.login-card h1 { margin-bottom: 20px; }
.login-card input {
  width: 100%; padding: 12px 16px; margin: 6px 0; border-radius: 10px;
  border: 1px solid var(--border); font-size: 0.95em; outline: none;
}
.login-card button {
  width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none;
  background: var(--line-green); color: #fff; font-weight: 700; font-size: 1em; cursor: pointer;
}

.dashboard { display: none; }
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.top-bar button {
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border);
  background: #fff; cursor: pointer; font-size: 0.85em;
}

.card {
  background: var(--card); border-radius: 14px; padding: 18px;
  box-shadow: 0 2px 10px rgba(0,0,0,.05); margin-bottom: 14px;
}
.card h3 { font-size: 0.92em; margin-bottom: 12px; color: #555; letter-spacing: 1px; }

/* Room list */
.room-card {
  background: var(--card); border-radius: 14px; padding: 16px 18px;
  box-shadow: 0 2px 10px rgba(0,0,0,.05); margin-bottom: 10px;
  cursor: pointer; transition: transform .15s; border-left: 4px solid var(--line-green);
}
.room-card:active { transform: scale(.99); }
.room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.room-header strong { font-size: 1.05em; }
.room-stats { display: flex; gap: 16px; font-size: 0.78em; color: var(--muted); }

/* Detail page */
.detail { display: none; }
.back-btn { margin-bottom: 12px; cursor: pointer; color: var(--line-green); font-weight: 600; }

.stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.85em; }
.stat-row .val { font-weight: 700; }

.user-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid #f5f5f5; font-size: 0.83em;
}
.user-row .ip { color: var(--muted); font-size: 0.85em; font-family: monospace; }
.user-row .badge {
  padding: 2px 8px; border-radius: 6px; font-size: 0.75em; font-weight: 700;
}
.badge-admin { background: #fff3cd; color: #856404; }
.badge-user { background: #e8f5e9; color: #2e7d32; }
.user-row button {
  margin-left: auto; padding: 4px 10px; border-radius: 6px; border: 1px solid #ccc;
  background: #fff; cursor: pointer; font-size: 0.75em;
}

.log-row {
  padding: 5px 0; border-bottom: 1px solid #fafafa; font-size: 0.78em;
  display: flex; gap: 10px;
}
.log-row .ltime { color: var(--muted); min-width: 48px; }
.log-row .lact { min-width: 50px; font-weight: 600; }
.log-row .luser { font-weight: 600; min-width: 70px; }
.log-row .lip { color: var(--muted); font-family: monospace; font-size: 0.85em; }
.log-row .lact.join { color: #27ae60; }
.log-row .lact.leave { color: #e74c3c; }
.log-row .lact.setAdmin { color: #f39c12; }

.log-scroll { max-height: 320px; overflow-y: auto; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 24px; border-radius: 20px;
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity .3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <!-- Login -->
  <div id="loginScreen" class="login-card">
    <h1>🔧 管理画面</h1>
    <input id="userInput" placeholder="アカウント" value="jinzhengen">
    <input id="pwdInput" type="password" placeholder="パスワード">
    <button onclick="doLogin()">ログイン</button>
  </div>

  <!-- Room list -->
  <div id="roomList" class="dashboard">
    <div class="top-bar">
      <div>
        <h1>🔧 管理画面 <span>全ルーム</span></h1>
        <p class="sub" id="dTime">---</p>
      </div>
      <div>
        <button onclick="loadRooms()">🔄 更新</button>
        <button onclick="doLogout()">↩ ログアウト</button>
      </div>
    </div>
    <div id="roomCards"></div>
  </div>

  <!-- Room detail -->
  <div id="detailView" class="detail">
    <div class="top-bar">
      <div>
        <span class="back-btn" onclick="backToRooms()">← ルーム一覧に戻る</span>
        <h1 id="detailTitle">---</h1>
      </div>
      <div>
        <button onclick="loadRoomDetail()">🔄 更新</button>
        <button onclick="doLogout()">↩ ログアウト</button>
      </div>
    </div>

    <div class="card">
      <div class="stat-row"><span>👑 管理者</span><span class="val" id="dAdmin">---</span></div>
      <div class="stat-row"><span>👥 オンライン</span><span class="val" id="dCount">---</span></div>
      <div class="stat-row"><span>💬 メッセージ数</span><span class="val" id="dMsgCount">---</span></div>
      <div class="stat-row" style="margin-top:8px">
        <span>🔒 パスワード</span>
        <input id="roomPwdInput" placeholder="(空=なし)" style="padding:5px 10px;border-radius:6px;border:1px solid #ddd;font-size:0.85em;width:120px;text-align:center" onchange="saveRoomPwd()">
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>👥 オンラインユーザー</h3>
        <div id="onlineList">---</div>
      </div>
      <div class="card">
        <h3>📋 入退室ログ</h3>
        <div class="log-scroll" id="logList">---</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = '', currentPwd = '';

// Restore session
const saved = localStorage.getItem('admin_session');
if (saved) {
  const s = JSON.parse(saved);
  currentUser = s.user; currentPwd = s.pwd;
  document.getElementById('loginScreen').style.display = 'none';
  showRooms();
  loadRooms();
}

// ── Login ──
function doLogin() {
  currentUser = document.getElementById('userInput').value.trim();
  currentPwd = document.getElementById('pwdInput').value.trim();
  if (!currentUser || !currentPwd) return alert('入力してください');
  localStorage.setItem('admin_session', JSON.stringify({ user: currentUser, pwd: currentPwd }));
  document.getElementById('loginScreen').style.display = 'none';
  showRooms();
  loadRooms();
}

function doLogout() {
  localStorage.removeItem('admin_session');
  location.reload();
}

// ── Room list ──
function showRooms() {
  document.getElementById('roomList').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
}

async function loadRooms() {
  document.getElementById('dTime').textContent = '更新: ' + new Date().toLocaleTimeString('ja-JP');
  try {
    const res = await fetch(`/api/admin/rooms?user=${encodeURIComponent(currentUser)}&pwd=${encodeURIComponent(currentPwd)}`);
    if (!res.ok) { toast('⚠️ 認証エラー'); return; }
    const rooms = await res.json();

    if (rooms.length === 0) {
      document.getElementById('roomCards').innerHTML = `
        <div class="card" style="text-align:center;padding:30px">
          <p style="color:#aaa;margin-bottom:16px">まだルームがありません</p>
          <p style="font-size:0.82em;color:#888;margin-bottom:10px">まずはチャットリンクを開いてルームを作成してください</p>
          <div style="display:flex;gap:8px;justify-content:center">
            <input id="newRoomName" placeholder="ルーム名" style="padding:10px;border-radius:10px;border:1px solid #ddd;font-size:0.9em;text-align:center" value="テスト">
            <button onclick="createRoom()" style="padding:10px 20px;border-radius:10px;border:none;background:#06C755;color:#fff;font-weight:700;cursor:pointer;font-size:0.9em">作成 & リンクコピー</button>
          </div>
          <div id="newRoomLink" style="margin-top:12px;font-size:0.85em;color:#06C755;display:none"></div>
        </div>`;
      return;
    }

    document.getElementById('roomCards').innerHTML = rooms.map(r => `
      <div class="room-card" onclick="openRoom('${r.roomId}')">
        <div class="room-header">
          <strong>💬 ${r.roomId} ${r.password ? '🔒' : ''}</strong>
          <span style="font-size:0.8em;color:#888">👑 ${r.admin || '---'}</span>
        </div>
        <div class="room-stats">
          <span>👥 ${r.onlineCount}人在線</span>
          <span>💬 ${r.messageCount}件</span>
          <span>📋 ${r.joinLogCount}ログ</span>
        </div>
      </div>
    `).join('');
  } catch (e) { toast('⚠️ 通信エラー'); }
}

function createRoom() {
  const name = document.getElementById('newRoomName').value.trim() || 'テスト';
  const link = location.origin + '/?room=' + encodeURIComponent(name);
  document.getElementById('newRoomLink').style.display = 'block';
  document.getElementById('newRoomLink').innerHTML = '🔗 <a href="' + link + '" target="_blank" style="color:#06C755">' + link + '</a> (クリックで開く)';
  navigator.clipboard?.writeText(link);
  toast('✅ リンクをコピーしました！このリンクを開くとルームが作成されます');
}

// ── Room detail ──
let detailRoom = '';

function openRoom(roomId) {
  detailRoom = roomId;
  document.getElementById('roomList').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('detailTitle').textContent = '💬 ' + roomId;
  loadRoomDetail();
}

function backToRooms() {
  detailRoom = '';
  showRooms();
  loadRooms();
}

async function loadRoomDetail() {
  try {
    const res = await fetch(`/api/admin/${encodeURIComponent(detailRoom)}?user=${encodeURIComponent(currentUser)}&pwd=${encodeURIComponent(currentPwd)}`);
    if (!res.ok) { toast('⚠️ 読込エラー'); return; }
    const data = await res.json();

    document.getElementById('dAdmin').textContent = data.admin || '---';
    document.getElementById('dCount').textContent = data.onlineCount;
    document.getElementById('dMsgCount').textContent = data.messageCount;
    document.getElementById('roomPwdInput').value = data.password || '';

    // Online users
    document.getElementById('onlineList').innerHTML = data.online.length === 0
      ? '<div style="color:#aaa;padding:10px">誰もいません</div>'
      : data.online.map(u => `
        <div class="user-row">
          <span>${u.userName}</span>
          ${u.isAdmin ? '<span class="badge badge-admin">👑 管理者</span>' : '<span class="badge badge-user">ユーザー</span>'}
          <span class="ip">${u.ip}</span>
          ${!u.isAdmin ? `<button onclick="makeAdmin('${u.userName}')">👑 管理者にする</button>` : ''}
        </div>
      `).join('');

    // Join log
    document.getElementById('logList').innerHTML = data.joinLog.length === 0
      ? '<div style="color:#aaa">ログなし</div>'
      : data.joinLog.map(l => {
        const actLabel = l.action.includes('setAdmin') ? '👑管理者変更' : l.action === 'join' ? '入室' : '退室';
        const actClass = l.action.includes('setAdmin') ? 'setAdmin' : l.action;
        return `<div class="log-row">
          <span class="ltime">${new Date(l.time).toLocaleTimeString('ja-JP')}</span>
          <span class="lact ${actClass}">${actLabel}</span>
          <span class="luser">${l.userName}</span>
          <span class="lip">${l.ip}</span>
        </div>`;
      }).join('');
  } catch (e) { toast('⚠️ 通信エラー'); }
}

async function saveRoomPwd() {
  const pwd = document.getElementById('roomPwdInput').value.trim();
  try {
    const res = await fetch(`/api/admin/${encodeURIComponent(detailRoom)}/setPassword`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: currentUser, pwd: currentPwd, newPassword: pwd || null }),
    });
    if (res.ok) toast(pwd ? '✅ パスワードを設定しました' : '✅ パスワードを解除しました');
    else toast('⚠️ 失敗しました');
  } catch (e) { toast('⚠️ 通信エラー'); }
}

async function makeAdmin(userName) {
  try {
    const res = await fetch(`/api/admin/${encodeURIComponent(detailRoom)}/setAdmin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: currentUser, pwd: currentPwd, newAdmin: userName }),
    });
    if (res.ok) { toast(`✅ ${userName} を管理者に設定しました`); loadRoomDetail(); }
    else toast('⚠️ 失敗しました');
  } catch (e) { toast('⚠️ 通信エラー'); }
}

setInterval(() => {
  if (document.getElementById('detailView').style.display !== 'none') loadRoomDetail();
}, 10000);

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
